<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">The Complete Health App Overview</title>
  <desc id="desc">A high-level architecture graph showing public website, attendance, admin panel, APIs, Prisma, MongoDB, and external services.</desc>
  <defs>
    <style>
      .bg { fill: #f4f6f5; }
      .panel { fill: #ffffff; stroke: #dfe5e2; stroke-width: 2; }
      .dark { fill: #111315; }
      .green { fill: #113a31; }
      .lime { fill: #b8f24b; }
      .mint { fill: #ddf8d1; }
      .coral { fill: #f06449; }
      .text { fill: #111315; font-family: Inter, Arial, sans-serif; font-weight: 800; }
      .sub { fill: #647077; font-family: Inter, Arial, sans-serif; font-weight: 600; }
      .white { fill: #ffffff; font-family: Inter, Arial, sans-serif; font-weight: 800; }
      .line { stroke: #113a31; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #647077; stroke-width: 3; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow-muted); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#113a31"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#647077"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <rect x="60" y="60" width="1480" height="880" rx="28" class="panel"/>

  <rect x="100" y="100" width="1400" height="92" rx="18" class="dark"/>
  <rect x="130" y="122" width="56" height="48" rx="10" class="lime"/>
  <text x="158" y="154" text-anchor="middle" class="text" font-size="22">TCH</text>
  <text x="210" y="154" class="white" font-size="34">The Complete Health App</text>
  <text x="210" y="178" fill="#d8ddd9" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600">One image view of website, admin, attendance, database, and services</text>

  <rect x="110" y="270" width="250" height="112" rx="16" class="panel"/>
  <text x="235" y="318" text-anchor="middle" class="text" font-size="25">Visitors</text>
  <text x="235" y="350" text-anchor="middle" class="sub" font-size="17">Customers / Members</text>

  <rect x="440" y="235" width="280" height="95" rx="16" class="mint"/>
  <text x="580" y="280" text-anchor="middle" class="text" font-size="24">Public Website</text>
  <text x="580" y="310" text-anchor="middle" class="sub" font-size="16">Products, blog, checkout</text>

  <rect x="440" y="370" width="280" height="95" rx="16" class="mint"/>
  <text x="580" y="416" text-anchor="middle" class="text" font-size="24">Attendance</text>
  <text x="580" y="446" text-anchor="middle" class="sub" font-size="16">Mobile check-in</text>

  <rect x="110" y="560" width="250" height="112" rx="16" class="panel"/>
  <text x="235" y="608" text-anchor="middle" class="text" font-size="25">Admin</text>
  <text x="235" y="640" text-anchor="middle" class="sub" font-size="17">Owner / Team</text>

  <rect x="440" y="540" width="280" height="150" rx="16" class="green"/>
  <text x="580" y="586" text-anchor="middle" class="white" font-size="25">Admin Panel</text>
  <text x="580" y="620" text-anchor="middle" fill="#d8ddd9" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Catalog, Orders, Leads</text>
  <text x="580" y="648" text-anchor="middle" fill="#d8ddd9" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Inventory, CMS, Analytics</text>

  <rect x="805" y="245" width="250" height="95" rx="16" class="panel"/>
  <text x="930" y="290" text-anchor="middle" class="text" font-size="22">Store APIs</text>
  <text x="930" y="318" text-anchor="middle" class="sub" font-size="15">Products / Checkout</text>

  <rect x="805" y="380" width="250" height="95" rx="16" class="panel"/>
  <text x="930" y="425" text-anchor="middle" class="text" font-size="22">Attendance API</text>
  <text x="930" y="453" text-anchor="middle" class="sub" font-size="15">/api/attendance</text>

  <rect x="805" y="565" width="250" height="95" rx="16" class="panel"/>
  <text x="930" y="610" text-anchor="middle" class="text" font-size="22">Admin APIs</text>
  <text x="930" y="638" text-anchor="middle" class="sub" font-size="15">Leads / Overview</text>

  <rect x="1130" y="312" width="280" height="235" rx="22" class="dark"/>
  <text x="1270" y="365" text-anchor="middle" class="white" font-size="30">MongoDB</text>
  <text x="1270" y="402" text-anchor="middle" fill="#d8ddd9" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Main live database</text>
  <rect x="1180" y="435" width="180" height="42" rx="10" class="lime"/>
  <text x="1270" y="462" text-anchor="middle" class="text" font-size="16">Prisma Models</text>

  <rect x="1125" y="635" width="292" height="115" rx="16" class="panel"/>
  <text x="1271" y="680" text-anchor="middle" class="text" font-size="22">External Services</text>
  <text x="1271" y="710" text-anchor="middle" class="sub" font-size="16">Razorpay, Stripe</text>
  <text x="1271" y="735" text-anchor="middle" class="sub" font-size="16">Shiprocket, Delhivery</text>

  <path d="M360 312 C390 300 410 292 440 286" class="line"/>
  <path d="M360 346 C392 365 410 384 440 410" class="line"/>
  <path d="M360 616 C392 616 410 616 440 616" class="line"/>

  <path d="M720 282 C758 286 775 290 805 292" class="line"/>
  <path d="M720 418 C760 420 775 425 805 428" class="line"/>
  <path d="M720 615 C760 614 775 613 805 613" class="line"/>

  <path d="M1055 292 C1088 326 1102 350 1130 380" class="line"/>
  <path d="M1055 428 C1088 426 1102 424 1130 422" class="line"/>
  <path d="M1055 613 C1090 575 1105 540 1130 500" class="line"/>

  <path d="M1055 650 C1092 660 1100 670 1125 686" class="dash"/>
  <path d="M1125 708 C1075 720 1030 720 965 662" class="dash"/>

  <rect x="165" y="795" width="1270" height="86" rx="16" class="mint"/>
  <text x="800" y="832" text-anchor="middle" class="text" font-size="24">Working Core</text>
  <text x="800" y="862" text-anchor="middle" class="sub" font-size="18">Admin Login • WhatsApp Leads • Attendance • MongoDB • Prisma • Storefront</text>
</svg>
